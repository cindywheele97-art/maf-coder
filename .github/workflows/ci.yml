name: gate

# Runs the same gate as local development — ruff, mypy, pytest — on every push
# and pull request. Mirrors: `pytest && ruff check src tests && mypy src/maf_coder`.

on:
  push:
  pull_request:

# Cancel an in-progress run when new commits land on the same ref.
concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src/maf_coder

      - name: Tests (pytest)
        run: pytest

      - name: Security scan (bandit)
        run: bandit -r src/maf_coder --severity-level medium --confidence-level medium

      - name: Dependency audit (pip-audit)
        run: pip-audit --skip-editable
